# SPOKE only: Secret consumed by ClusterLogForwarder for external (hub) Loki.
# Create with oc create secret (see README Step 1b) after obtaining token + CA from the hub.
#
# Keys:
#   token         — raw JWT only (do NOT prefix with "Bearer "; the collector adds it).
#   ca-bundle.crt — PEM of the CA that signed the hub Loki gateway certificate (see README).
apiVersion: v1
kind: Secret
metadata:
  name: to-loki-secret
  namespace: openshift-logging
type: Opaque
stringData:
  token: "<paste-raw-jwt-from-hub-oc-create-token>"
  ca-bundle.crt: |
    -----BEGIN CERTIFICATE-----
    ...
    -----END CERTIFICATE-----
