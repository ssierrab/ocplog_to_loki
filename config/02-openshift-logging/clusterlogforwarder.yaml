# OpenShift Logging 6.x.
# 1) serviceaccount.sh — creates logcollector SA + RBAC
# 2) create-lokistack-bearer-secret.sh — Secret loki-stack-bearer-token (key: token)
#
# Authentication: Bearer token read from Secret (not projected SA token).
# Token should be a valid Kubernetes/OAuth token for the same cluster (e.g. from logcollector).
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: default-lokistack
      type: lokiStack
      lokiStack:
        target:
          name: logging-loki
          namespace: openshift-logging
        authentication:
          token:
            from: secret
            secret:
              name: loki-stack-bearer-token
              key: token
      tls:
        ca:
          key: service-ca.crt
          configMapName: openshift-service-ca.crt
  pipelines:
    - name: default
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - default-lokistack
