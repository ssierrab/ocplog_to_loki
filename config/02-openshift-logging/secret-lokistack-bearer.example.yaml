# Example: Bearer token Secret for ClusterLogForwarder lokiStack.authentication.token (from: secret).
# Prefer: scripts/create-lokistack-bearer-secret.sh (populates token from logcollector SA).
#
# Manual apply (replace TOKEN_VALUE):
#   oc create secret generic loki-stack-bearer-token -n openshift-logging \
#     --from-literal=token="TOKEN_VALUE" --dry-run=client -o yaml | oc apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: loki-stack-bearer-token
  namespace: openshift-logging
type: Opaque
stringData:
  token: "<replace-with-bearer-token>"
