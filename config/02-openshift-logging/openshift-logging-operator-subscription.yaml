# OCP 4.20 – Red Hat OpenShift Logging Operator — channel must exist on redhat-operators and match Loki (__OPERATOR_CHANNEL__).
# Replaced by make or scripts/render-operator-channel.sh (see README).
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: cluster-logging
  namespace: openshift-logging
spec:
  channel: __OPERATOR_CHANNEL__
  installPlanApproval: Manual
  name: cluster-logging
  source: redhat-operators
  sourceNamespace: openshift-marketplace
