# HUB only (optional — Method 1 token): Secret filled by the control plane with a long-lived SA token.
# Apply after 01-serviceaccount.yaml. Skip if you use only Method 2 (oc create token).
#
#   oc wait --for=jsonpath='{.data.token}' secret/remote-log-writer-token -n openshift-logging --timeout=120s
#   oc get secret remote-log-writer-token -n openshift-logging -o jsonpath='{.data.token}' | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: remote-log-writer-token
  namespace: openshift-logging
  annotations:
    kubernetes.io/service-account.name: remote-log-writer
type: kubernetes.io/service-account-token
