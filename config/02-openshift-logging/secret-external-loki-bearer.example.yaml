# Bearer token for ClusterLogForwarder → external Loki (hub gateway).
# Create on the SPOKE in openshift-logging before applying clusterlogforwarder-external-loki*.yaml
#
# The token must be accepted by the hub Loki/OAuth proxy (e.g. oc create token <sa> -n openshift-logging on the HUB).
#
#   oc create secret generic loki-external-bearer-token -n openshift-logging \
#     --from-literal=token="YOUR_HUB_BEARER_TOKEN" --dry-run=client -o yaml | oc apply -f -
#
# Or: scripts/create-external-loki-bearer-secret.sh (reads EXTERNAL_LOKI_BEARER_TOKEN or prompts).
apiVersion: v1
kind: Secret
metadata:
  name: loki-external-bearer-token
  namespace: openshift-logging
type: Opaque
stringData:
  token: "<hub-bearer-token>"
