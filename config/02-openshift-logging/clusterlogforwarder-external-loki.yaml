# Forward logs from this cluster (spoke) to Loki running on another cluster (hub).
# Deploy this on the SPOKE. The hub’s Loki is deployed separately (Step 2 on the hub).
# 1. Create secret openshift-logging/loki-external-secret (see secret-external-loki.example.yaml).
# 2. Set the URL below to the HUB’s Loki push endpoint (e.g. https://<loki-gateway-on-hub>/loki/api/v1/push).
# 3. Apply this file on the spoke.
# OCP 4.20 – works with OpenShift Logging 5.x / 6.x (ClusterLogForwarder).
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: external-loki
      type: loki
      url: https://<loki-gateway-on-hub>/loki/api/v1/push  # Replace with hub Loki gateway URL
      # Optional: secret with tls.crt, tls.key, ca-bundle.crt for TLS client auth
      secret:
        name: loki-external-secret
  pipelines:
    - name: default
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - external-loki
