# Forward logs from this cluster (spoke) to Loki on the hub.
# 1. Create Secret loki-external-bearer-token (key: token) — see secret-external-loki-bearer.example.yaml
#    or scripts/create-external-loki-bearer-secret.sh
# 2. Set loki.url to the hub Loki push endpoint.
# 3. Adjust tls if the hub gateway is not signed by the spoke cluster’s service CA.
# OCP 4.20 — observability.openshift.io / Logging 6.x
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: external-loki
      type: loki
      loki:
        url: https://<loki-gateway-on-hub>/loki/api/v1/push
        authentication:
          token:
            from: secret
            secret:
              name: loki-external-bearer-token
              key: token
      tls:
        ca:
          key: service-ca.crt
          configMapName: openshift-service-ca.crt
  pipelines:
    - name: default
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - external-loki
