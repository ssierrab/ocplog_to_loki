# SPOKE: forward logs to Loki on the hub.
# HUB setup + spoke Secret to-loki-secret — see README “External Loki: token from hub”.
# Logging 6.x (observability.openshift.io/v1)
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: external-loki
      type: loki
      loki:
        url: https://<loki-gateway-on-hub>/loki/api/v1/push
        authentication:
          token:
            from: secret
            secret:
              name: to-loki-secret
              key: token
      tls:
        ca:
          key: ca-bundle.crt
          secretName: to-loki-secret
  pipelines:
    - name: default
      inputRefs:
        - application
        - infrastructure
        - audit
      outputRefs:
        - external-loki
