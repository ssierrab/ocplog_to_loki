# SPOKE: forward logs to Loki on the hub (Red Hat LokiStack with gateway + openshift-logging tenants).
# HUB setup + spoke Secret to-loki-secret — see README §2.4.2.
# Logging 6.x (observability.openshift.io/v1)
#
# Per-tenant gateway base (openshift-logging mode). Do NOT append /loki/api/v1/push here:
# the collector's Vector Loki sink appends /loki/api/v1/push to loki.url automatically.
#   https://<route-host>/api/logs/v1/application
#   https://<route-host>/api/logs/v1/infrastructure
#   https://<route-host>/api/logs/v1/audit
# Manual curl tests use the full path .../loki/api/v1/push (see README).
# Replace <loki-gateway-on-hub> with oc get route logging-loki -n openshift-logging (host only).
#
apiVersion: observability.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  serviceAccount:
    name: logcollector
  outputs:
    - name: external-loki-application
      type: loki
      loki:
        url: https://<loki-gateway-on-hub>/api/logs/v1/application
        authentication:
          token:
            from: secret
            secret:
              name: to-loki-secret
              key: token
      tls:
        ca:
          key: ca-bundle.crt
          secretName: to-loki-secret
    - name: external-loki-infrastructure
      type: loki
      loki:
        url: https://<loki-gateway-on-hub>/api/logs/v1/infrastructure
        authentication:
          token:
            from: secret
            secret:
              name: to-loki-secret
              key: token
      tls:
        ca:
          key: ca-bundle.crt
          secretName: to-loki-secret
    - name: external-loki-audit
      type: loki
      loki:
        url: https://<loki-gateway-on-hub>/api/logs/v1/audit
        authentication:
          token:
            from: secret
            secret:
              name: to-loki-secret
              key: token
      tls:
        ca:
          key: ca-bundle.crt
          secretName: to-loki-secret
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - external-loki-application
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - external-loki-infrastructure
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - external-loki-audit
