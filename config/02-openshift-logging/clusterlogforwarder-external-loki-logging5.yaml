# SPOKE: forward to hub Loki — logging.openshift.io / Logging 5.x
# Secret to-loki-secret: keys token (raw JWT) and ca-bundle.crt (hub gateway CA PEM).
# LokiStack gateway: per-tenant base URL only — Vector appends /loki/api/v1/push (Logging 6); confirm for 5.x.
#
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  outputs:
    - name: external-loki-application
      type: loki
      url: https://<loki-gateway-on-hub>/api/logs/v1/application
      secret:
        name: to-loki-secret
    - name: external-loki-infrastructure
      type: loki
      url: https://<loki-gateway-on-hub>/api/logs/v1/infrastructure
      secret:
        name: to-loki-secret
    - name: external-loki-audit
      type: loki
      url: https://<loki-gateway-on-hub>/api/logs/v1/audit
      secret:
        name: to-loki-secret
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - external-loki-application
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - external-loki-infrastructure
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - external-loki-audit
