# Forward logs from this cluster (spoke) to Loki on the hub (OpenShift Logging 5.x).
# Deploy this on the SPOKE. For OCP 4.20 with default Logging 5.x.
# 1. Create secret openshift-logging/loki-external-secret (see secret-external-loki.example.yaml).
# 2. Set the URL below to the HUB’s Loki push endpoint.
# 3. Apply this file on the spoke.
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
spec:
  outputs:
    - name: external-loki
      type: loki
      url: https://<loki-gateway-on-hub>/loki/api/v1/push  # Replace with hub Loki gateway URL
      secret:
        name: loki-external-secret
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - external-loki
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - external-loki
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - external-loki
