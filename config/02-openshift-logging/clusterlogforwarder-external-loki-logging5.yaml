# SPOKE: forward to hub Loki — logging.openshift.io / Logging 5.x
# Secret to-loki-secret: keys token (raw JWT) and ca-bundle.crt (hub gateway CA PEM).
# If your release only supports a single secret reference, ensure both keys exist in to-loki-secret.
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: collector
  namespace: openshift-logging
spec:
  outputs:
    - name: external-loki
      type: loki
      url: https://<loki-gateway-on-hub>/loki/api/v1/push
      secret:
        name: to-loki-secret
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - external-loki
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - external-loki
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - external-loki
