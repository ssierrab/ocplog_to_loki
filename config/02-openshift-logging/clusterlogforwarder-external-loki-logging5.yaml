# Forward logs from spoke to Loki on hub — logging.openshift.io / Logging 5.x
# 1. Secret loki-external-bearer-token in openshift-logging with key "token" (bearer value).
#    See secret-external-loki-bearer.example.yaml or create-external-loki-bearer-secret.sh
# 2. Some 5.x versions expect the bearer key name "bearerToken" instead of "token"; check your release docs.
# 3. Set url to the hub Loki push endpoint.
apiVersion: logging.openshift.io/v1
kind: ClusterLogForwarder
metadata:
  name: instance
  namespace: openshift-logging
spec:
  outputs:
    - name: external-loki
      type: loki
      url: https://<loki-gateway-on-hub>/loki/api/v1/push
      secret:
        name: loki-external-bearer-token
  pipelines:
    - name: application
      inputRefs:
        - application
      outputRefs:
        - external-loki
    - name: infrastructure
      inputRefs:
        - infrastructure
      outputRefs:
        - external-loki
    - name: audit
      inputRefs:
        - audit
      outputRefs:
        - external-loki
