# Example secret for external Loki TLS/client authentication.
# Copy to secret-external-loki.yaml, fill in your certs/keys, then:
#   oc apply -f config/02-openshift-logging/secret-external-loki.yaml
# Keys: tls.crt (client cert), tls.key (client key), ca-bundle.crt (CA for server verification).
# Omit or leave empty if your external Loki uses server TLS only (no client auth).
apiVersion: v1
kind: Secret
metadata:
  name: loki-external-secret
  namespace: openshift-logging
type: Opaque
stringData:
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  # tls.key: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  # ca-bundle.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
