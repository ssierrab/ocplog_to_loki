# Optional: TLS client certificate material for external Loki (mTLS), if supported by your Logging version.
# Default external auth: Secret **to-loki-secret** (keys **token**, **ca-bundle.crt**) — see README §2.4.2.
#
# Copy to secret-external-loki.yaml, fill in your certs/keys, then:
#   oc apply -f config/02-openshift-logging/secret-external-loki.yaml
# Keys: tls.crt (client cert), tls.key (client key), ca-bundle.crt (CA for server verification).
apiVersion: v1
kind: Secret
metadata:
  name: loki-external-secret
  namespace: openshift-logging
type: Opaque
stringData:
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  # tls.key: |
  #   -----BEGIN PRIVATE KEY-----
  #   ...
  # ca-bundle.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
