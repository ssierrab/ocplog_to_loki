# OCP 4.20 – Loki Operator (internal LokiStack with ODF)
# Channel must exist on redhat-operators (see: oc get packagemanifest loki-operator -n openshift-marketplace).
# Red Hat OpenShift Logging 6.4 docs use stable-6.<y>, e.g. stable-6.4 — not the legacy "stable" channel.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators-redhat
spec:
  channel: stable-6.4
  installPlanApproval: Manual
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
