# OCP 4.20 – Loki Operator (internal LokiStack with ODF)
# Placeholder __OPERATOR_CHANNEL__ is replaced by make or scripts/render-operator-channel.sh (prompt or OPERATOR_CHANNEL env — see README).
# Use the same channel as cluster-logging (stable-6.y). Legacy "stable" is often absent for these packages.
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: loki-operator
  namespace: openshift-operators-redhat
spec:
  channel: __OPERATOR_CHANNEL__
  installPlanApproval: Manual
  name: loki-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
